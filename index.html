<!DOCTYPE html>
<html lang="he">
<head>
<link rel="apple-touch-icon" href="icon.PNG">
<link rel="icon" href="icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ספר אנשי קשר</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  direction: rtl;
  padding: 18px 14px 28px;
  background: #f3f6fb;
  text-align: center;
  color: #1f2937;
}

h2, h3 {
  margin-top: 0;
}

h2 {
  font-size: 28px;
  margin-bottom: 10px;
  font-weight: 700;
  color: #1f2a44;
}

h3 {
  font-size: 22px;
  margin-bottom: 16px;
  color: #1f2a44;
}

#login,
#app {
  max-width: 420px;
  margin: 0 auto;
}

#login {
  background: #ffffff;
  border-radius: 20px;
  padding: 22px 18px 20px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
  border: 1px solid #e7edf5;
  margin-top: 28px;
}

input, select {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin: 10px 0;
  border-radius: 14px;
  border: 1px solid #d6dfeb;
  background: #ffffff;
  text-align: center;
  font-size: 16px;
  color: #1f2937;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  -webkit-appearance: none;
  appearance: none;
}

input:focus, select:focus {
  border-color: #7aa7ff;
  box-shadow: 0 0 0 4px rgba(122, 167, 255, 0.16);
  background: #fcfdff;
}

button {
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: transform 0.08s ease, opacity 0.2s ease, box-shadow 0.2s ease;
}

button:active {
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

#login button {
  width: 100%;
  margin-top: 6px;
  padding: 14px 16px;
  background: #3b82f6;
  color: white;
  box-shadow: 0 8px 18px rgba(59, 130, 246, 0.22);
}

#login button:hover {
  opacity: 0.96;
}

#userInfo {
  margin: 0 auto 12px;
  color: #42526b;
  font-size: 14px;
  background: #eef4ff;
  border: 1px solid #dbe7ff;
  border-radius: 12px;
  padding: 10px 12px;
}

#hint {
  color: #6b7280;
  margin: 0 0 10px;
  font-size: 14px;
  line-height: 1.5;
}

#searchInput,
select {
  background: #ffffff;
}

.searchWrap {
  position: relative;
  width: 100%;
  margin: 0 0 10px;
}

.searchWrap input {
  margin: 0;
  padding-left: 50px;
}

.clearSearchBtn {
  position: absolute;
  top: 50%;
  left: 10px;
  transform: translateY(-50%);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: #eef4ff;
  color: #1d4ed8;
  border: 1px solid #d9e6ff;
  font-size: 18px;
  line-height: 1;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.clearSearchBtn.visible {
  display: flex;
}

#logo {
  display: block;
  margin: 28px auto 20px;
  width: 56vw;
  max-width: 220px;
  min-width: 150px;
  height: auto;
  border-radius: 28px;
  overflow: hidden;
  object-fit: cover;
  transition: opacity 0.3s ease, height 0.3s ease, margin 0.3s ease;
}

.hidden {
  opacity: 0;
  height: 0;
  margin: 0 auto;
  overflow: hidden;
}

.statusMessage {
  display: none;
  margin: 12px auto 0;
  padding: 12px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  max-width: 420px;
}

.statusMessage.visible {
  display: block;
}

.statusMessage.loading {
  background: #eef4ff;
  border: 1px solid #dbe7ff;
  color: #32507b;
}

.statusMessage.empty {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #475569;
}

.statusMessage.error {
  background: #fff1f2;
  border: 1px solid #fecdd3;
  color: #be123c;
}

.contact {
  background: #ffffff;
  border-radius: 18px;
  padding: 16px 16px 14px;
  margin: 12px auto;
  max-width: 420px;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.07);
  border: 1px solid #e7edf5;
  text-align: right;
}

.contactHeader {
  margin-bottom: 10px;
}

.contactName {
  display: block;
  font-size: 18px;
  font-weight: 700;
  color: #172033;
  line-height: 1.35;
}

.contactMeta {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.contactMetaRow {
  font-size: 14px;
  color: #4b5563;
  line-height: 1.5;
}

.contactMetaRow.phoneRow {
  color: #1f2937;
  font-weight: 600;
}

.contactMetaRow a {
  color: #2563eb;
  text-decoration: none;
  word-break: break-word;
}

.contactMetaRow a:hover {
  text-decoration: underline;
}

.contactActions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 2px;
  margin-bottom: 12px;
}

.actionChip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 10px 12px;
  border-radius: 12px;
  background: #f8fbff;
  border: 1px solid #d9e6ff;
  color: #1d4ed8;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  flex: 1 1 calc(33.333% - 6px);
  min-width: 92px;
}

.actionChip:hover {
  background: #eef5ff;
}

.addContactBtn {
  width: 100%;
  margin-top: 0;
  padding: 13px 14px;
  background: #eef4ff;
  color: #1d4ed8;
  border: 1px solid #d9e6ff;
  font-size: 15px;
  font-weight: 700;
}

.addContactBtn:hover {
  background: #e6efff;
}

#list {
  margin-top: 8px;
}

@media (max-width: 600px) {
  body {
    padding: 14px 12px 24px;
  }

  h2 {
    font-size: 25px;
  }

  h3 {
    font-size: 20px;
  }

  #login {
    margin-top: 20px;
    padding: 20px 14px 16px;
    border-radius: 18px;
  }

  input, select {
    font-size: 16px;
    padding: 14px;
  }

  .contact {
    max-width: 100%;
    padding: 15px 14px 13px;
    border-radius: 16px;
  }

  .contactName {
    font-size: 17px;
  }

  .actionChip {
    flex: 1 1 calc(50% - 4px);
  }

  #logo {
    width: 62vw;
    max-width: 230px;
    min-width: 160px;
    margin: 30px auto 22px;
    border-radius: 30px;
  }
}
</style>

</head>
<body>

<div id="login">
  <h3>כניסה למערכת</h3>
  <input type="text" id="phoneInput" placeholder="הכנס מספר טלפון">
  <input type="password" id="passwordInput" placeholder="הכנס סיסמה">
  <br>
  <button id="loginButton" onclick="login()">כניסה</button>
  <div id="loginStatus" class="statusMessage"></div>
</div>

<div id="app" style="display:none;">

<h2>📇 ספר אנשי קשר</h2>
<div id="userInfo" style="margin-bottom:10px;color:#444;"></div>

<div id="hint">🔍 התחילו להקליד כדי לחפש איש קשר</div>

<div class="searchWrap">
  <input type="text" id="searchInput" placeholder="חפשו שם, מחלקה או תפקיד..." onkeyup="search()">
  <button type="button" class="clearSearchBtn" id="clearSearchBtn" onclick="clearSearch()">×</button>
</div>

<select onchange="filterByDept(this.value)">
  <option value="">כל המחלקות</option>
</select>

<img id="logo" src="icon.PNG">

<div id="statusMessage" class="statusMessage"></div>
<div id="list"></div>

</div>

<script>

const APP_PASSWORD = "mhfc1913";
let contacts = [];
let isLoadingContacts = false;
let hasLoadError = false;

function setStatus(elementId, message = "", type = "") {
  let el = document.getElementById(elementId);
  if (!el) return;

  el.textContent = message;
  el.className = "statusMessage";

  if (message) {
    el.classList.add("visible");
    if (type) el.classList.add(type);
  }
}

function setLoginButtonDisabled(disabled) {
  let btn = document.getElementById("loginButton");
  if (btn) {
    btn.disabled = disabled;
  }
}

async function loadContacts() {
  isLoadingContacts = true;
  hasLoadError = false;
  setLoginButtonDisabled(true);
  setLoginStatus("טוען אנשי קשר...", "loading");

  try {
    let res = await fetch("https://opensheet.elk.sh/1EN-gasJRSjrWz_HquzKnGlGFQeRBbCV1wxUAJSTXwAg/contacts");

    if (!res.ok) {
      throw new Error("Failed to load contacts");
    }

    let data = await res.json();

    let rawContacts = data.map((row, index) => ({
      id: index,
      first: (row.first_name_he || "").toString().trim(),
      last: (row.last_name_he || "").toString().trim(),
      firstEn: (row.first_name_en || "").toString().trim(),
      lastEn: (row.last_name_en || "").toString().trim(),
      title: (row.title_prefix || "").toString().trim(),
      name: ((row.title_prefix || "") + " " + (row.first_name_he || "") + " " + (row.last_name_he || "")).trim(),
      role: (row.role || "").toString().trim(),
      dept: (row.department || "").toString().trim(),
      phone: normalizePhone(row.phone || ""),
      email: (row.email || "").toString().replace(/\u200E/g, "").trim()
    })).filter(c => c.phone);

    contacts = deduplicateContacts(rawContacts);
    populateDepartments();

    setLoginStatus("", "");
  } catch (error) {
    console.error(error);
    contacts = [];
    hasLoadError = true;
    setLoginStatus("שגיאה בטעינת הנתונים. נסו לרענן את הדף.", "error");
  } finally {
    isLoadingContacts = false;
    setLoginButtonDisabled(false);
  }
}

function setLoginStatus(message = "", type = "") {
  setStatus("loginStatus", message, type);
}

function setListStatus(message = "", type = "") {
  setStatus("statusMessage", message, type);
}

function normalizePhone(p) {
  if (!p) return "";
  let num = p.replace(/\D/g, "");
  if (num.startsWith("0")) num = "972" + num.slice(1);
  if (!num.startsWith("972")) num = "972" + num;
  return "+" + num;
}

function formatPhoneForDisplay(phone) {
  let normalized = normalizePhone(phone);
  let digits = normalized.replace(/\D/g, "");

  if (digits.startsWith("972")) {
    digits = "0" + digits.slice(3);
  }

  if (digits.length === 10 && digits.startsWith("0")) {
    return digits.slice(0, 3) + "-" + digits.slice(3, 6) + "-" + digits.slice(6);
  }

  if (digits.length === 9 && digits.startsWith("0")) {
    return digits.slice(0, 2) + "-" + digits.slice(2, 5) + "-" + digits.slice(5);
  }

  return normalized;
}

function getPhoneSearchValue(phone) {
  let displayPhone = formatPhoneForDisplay(phone);
  return displayPhone.replace(/-/g, "").toLowerCase();
}

function buildDisplayName(contact) {
  return [contact.title, contact.first, contact.last].filter(Boolean).join(" ").trim();
}

function getContactInfoScore(contact) {
  let fields = [
    contact.first,
    contact.last,
    contact.firstEn,
    contact.lastEn,
    contact.title,
    contact.role,
    contact.dept,
    contact.email
  ];

  let filledFields = fields.filter(v => (v || "").toString().trim() !== "").length;
  let textLength = fields.reduce((sum, v) => sum + ((v || "").toString().trim().length), 0);

  return (filledFields * 1000) + textLength;
}

function isEmptyValue(value) {
  return (value || "").toString().trim() === "";
}

function mergeMissingFields(base, extra) {
  let merged = { ...base };

  let fieldsToComplete = [
    "first",
    "last",
    "firstEn",
    "lastEn",
    "title",
    "role",
    "dept",
    "email"
  ];

  fieldsToComplete.forEach(field => {
    if (isEmptyValue(merged[field]) && !isEmptyValue(extra[field])) {
      merged[field] = extra[field];
    }
  });

  merged.name = buildDisplayName(merged);

  return merged;
}

function deduplicateContacts(list) {
  let groupedByPhone = new Map();

  list.forEach(contact => {
    if (!groupedByPhone.has(contact.phone)) {
      groupedByPhone.set(contact.phone, []);
    }
    groupedByPhone.get(contact.phone).push(contact);
  });

  let mergedContacts = [];

  groupedByPhone.forEach(group => {
    let sortedGroup = [...group].sort((a, b) => getContactInfoScore(b) - getContactInfoScore(a));
    let merged = { ...sortedGroup[0] };

    for (let i = 1; i < sortedGroup.length; i++) {
      merged = mergeMissingFields(merged, sortedGroup[i]);
    }

    merged.name = buildDisplayName(merged);
    mergedContacts.push(merged);
  });

  return mergedContacts;
}

function login() {
  if (isLoadingContacts) {
    setLoginStatus("טוען אנשי קשר...", "loading");
    return;
  }

  if (hasLoadError) {
    setLoginStatus("שגיאה בטעינת הנתונים. נסו לרענן את הדף.", "error");
    return;
  }

  let input = document.getElementById("phoneInput").value;
  let password = document.getElementById("passwordInput").value;

  if (password !== APP_PASSWORD) {
    alert("סיסמה שגויה");
    return;
  }

  let normalized = normalizePhone(input);

  let found = contacts.find(c =>
    normalizePhone(c.phone) === normalized
  );

  if (found) {
    localStorage.setItem("userPhone", normalized);

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("userInfo").textContent =
      "מחובר/ת כ: " + (found.name || found.phone);

    show([]);
  } else {
    alert("מספר לא נמצא במערכת");
  }
}

function autoLogin() {
  if (hasLoadError) return;

  let saved = localStorage.getItem("userPhone");
  if (!saved) return;

  let found = contacts.find(c =>
    normalizePhone(c.phone) === saved
  );

  if (found) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("userInfo").textContent =
      "מחובר/ת כ: " + (found.name || found.phone);

    show([]);
  }
}

function updateSearchUI() {
  let q = document.getElementById("searchInput").value.trim();
  let clearBtn = document.getElementById("clearSearchBtn");

  if (q) {
    clearBtn.classList.add("visible");
  } else {
    clearBtn.classList.remove("visible");
  }
}

function clearSearch() {
  let input = document.getElementById("searchInput");
  let logo = document.getElementById("logo");

  input.value = "";
  logo.classList.remove("hidden");
  show([]);
  updateSearchUI();
  input.focus();
}

function shouldShowNoResults() {
  let searchInput = document.getElementById("searchInput");
  let select = document.querySelector("select");

  let q = searchInput ? searchInput.value.trim() : "";
  let dept = select ? select.value : "";

  return q.length >= 2 || !!dept;
}

function show(list) {
  if (!list.length) {
    document.getElementById("list").innerHTML = "";

    if (shouldShowNoResults()) {
      setListStatus("לא נמצאו תוצאות", "empty");
    } else {
      setListStatus("", "");
    }

    return;
  }

  setListStatus("", "");

  let html = "";

  list.forEach(c => {
    let cleanPhone = normalizePhone(c.phone).replace("+", "");
    let displayPhone = formatPhoneForDisplay(c.phone);

    let metaRows = "";
    let actionChips = "";

    if (c.role) {
      metaRows += `<div class="contactMetaRow">${c.role}</div>`;
    }

    if (c.dept) {
      metaRows += `<div class="contactMetaRow">${c.dept}</div>`;
    }

    metaRows += `
      <div class="contactMetaRow phoneRow">
        📞 <a href="tel:${c.phone}">${displayPhone}</a>
      </div>
    `;

    actionChips += `
      <a class="actionChip" href="tel:${c.phone}">חיוג</a>
      <a class="actionChip" href="https://wa.me/${cleanPhone}" target="_blank">וואטסאפ</a>
    `;

    if (c.email) {
      metaRows += `
        <div class="contactMetaRow">
          📧 <a href="mailto:${c.email}">${c.email}</a>
        </div>
      `;

      actionChips += `
        <a class="actionChip" href="mailto:${c.email}">מייל</a>
      `;
    }

    html += `
      <div class="contact">
        <div class="contactHeader">
          <span class="contactName">${c.name}</span>
        </div>

        <div class="contactMeta">
          ${metaRows}
        </div>

        <div class="contactActions">
          ${actionChips}
        </div>

        <button class="addContactBtn" onclick="downloadContact(${c.id})">הוסף לאנשי קשר</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function search() {
  let q = document.getElementById("searchInput").value.toLowerCase().trim();
  let qNoHyphen = q.replace(/-/g, "");
  let logo = document.getElementById("logo");

  updateSearchUI();

  if (q.length < 2) {
    logo.classList.remove("hidden");
    show([]);
    return;
  }

  logo.classList.add("hidden");

  let filtered = contacts.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.role.toLowerCase().includes(q) ||
    c.dept.toLowerCase().includes(q) ||
    c.phone.toLowerCase().includes(q) ||
    getPhoneSearchValue(c.phone).includes(qNoHyphen)
  );

  show(filtered);
}

function filterByDept(dept) {
  let logo = document.getElementById("logo");

  if (!dept) {
    logo.classList.remove("hidden");
    show([]);
    return;
  }

  logo.classList.add("hidden");

  let filtered = contacts.filter(c => c.dept === dept);
  show(filtered);
}

function populateDepartments() {
  let depts = [...new Set(contacts.map(c => c.dept).filter(Boolean))];
  let select = document.querySelector("select");

  select.innerHTML = '<option value="">כל המחלקות</option>';

  depts.sort().forEach(d => {
    let option = document.createElement("option");
    option.value = d;
    option.textContent = d;
    select.appendChild(option);
  });
}

function escapeVCardValue(value) {
  return (value || "")
    .toString()
    .replace(/\\/g, "\\\\")
    .replace(/\n/g, "\\n")
    .replace(/,/g, "\\,")
    .replace(/;/g, "\\;");
}

function downloadContact(id) {
  let c = contacts.find(x => x.id === id);

  let vcardLines = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `N;CHARSET=UTF-8:${escapeVCardValue(c.last)};${escapeVCardValue(c.first)};;;`,
    `FN;CHARSET=UTF-8:${escapeVCardValue(c.name)}`,
    `ORG;CHARSET=UTF-8:${escapeVCardValue(c.dept)}`,
    `TITLE;CHARSET=UTF-8:${escapeVCardValue(c.role)}`,
    `TEL;TYPE=CELL:${escapeVCardValue(c.phone)}`
  ];

  if (c.email) {
    vcardLines.push(`EMAIL:${escapeVCardValue(c.email)}`);
  }

  if (c.firstEn) {
    vcardLines.push(`X-PHONETIC-FIRST-NAME:${escapeVCardValue(c.firstEn)}`);
  }

  if (c.lastEn) {
    vcardLines.push(`X-PHONETIC-LAST-NAME:${escapeVCardValue(c.lastEn)}`);
  }

  vcardLines.push("END:VCARD");

  let vcard = vcardLines.join("\n");

  let blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = c.name + ".vcf";
  a.click();
}

loadContacts().then(() => autoLogin());

</script>

</body>
</html>
